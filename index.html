<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlasseChat – Real-time</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="nameModal" class="name-overlay">
        <div class="name-card">
            <h2>Velkommen!</h2>
            <p>Vælg et navn for at chatte</p>
            <input type="text" id="nameInput" placeholder="Dit navn" maxlength="20" autofocus>
            <button class="btn btn-block" id="saveNameBtn">Gå til chat</button>
        </div>
    </div>

    <div id="app" class="app" style="display: none;">
        <div class="chat-main">
            <div class="chat-header">
                <h2>🌐 Klassechat</h2>
                <span class="online-badge" id="onlineCount">0 online</span>
            </div>
            <div class="messages" id="globalMessages"></div>
            <div class="typing-indicator" id="typingIndicator" style="display:none;"></div>
            <div class="chat-input-area">
                <input type="text" id="globalInput" placeholder="Skriv din besked…" autocomplete="off">
                <button class="btn btn-icon" id="sendGlobalBtn">➤</button>
            </div>
        </div>
        <div class="sidebar">
            <h3>👥 Online nu</h3>
            <div class="online-list" id="onlineUsersList"></div>

            <div class="admin-box">
                <div class="admin-title">Admin</div>
                <div class="admin-status" id="adminStatus">Admin er låst</div>
                <input type="password" id="adminCodeInput" placeholder="Kode">
                <button class="btn btn-block" id="unlockAdminBtn">Lås op</button>
                <div class="admin-panel" id="adminPanel">
                    <button class="btn btn-block danger-btn" id="adminDeleteAllBtn">Slet alle beskeder</button>
                    <button class="btn btn-block" id="adminCleanupBtn">Ryd defekte beskeder</button>
                </div>
            </div>
        </div>
    </div>

    <div id="privateModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h4 id="privateRecipientName">💬 Privat chat</h4>
                <button class="close-btn" id="closePrivateBtn">&times;</button>
            </div>
            <div class="private-messages" id="privateMessages"></div>
            <div class="typing-indicator private" id="privateTypingIndicator" style="display:none;"></div>
            <div class="private-input-area">
                <input type="text" id="privateInput" placeholder="Privat besked…" autocomplete="off">
                <button class="btn" id="sendPrivateBtn">Send</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
